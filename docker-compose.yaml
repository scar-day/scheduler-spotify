version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telegram-spotify-bot
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - TELEGRAM_BOT_TOKEN=
      - TELEGRAM_CHAT_ID=
      - TELEGRAM_MESSAGE_ID=
      - SPOTIFY_CLIENT_ID=
      - SPOTIFY_CLIENT_SECRET=
      - SPOTIFY_REFRESH_TOKEN=